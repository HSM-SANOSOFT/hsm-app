name: Release Tag

# Cuts the channel tag + GitHub (pre)release when work lands on a protected branch.
# Channel is derived from the branch (see release strategy §6.4):
#   development  -> alpha  vX.Y.Z-alpha.<run>   (prerelease)
#   release/*    -> beta   vX.Y.Z-beta.<run>    (prerelease)
#   main         -> stable vX.Y.Z               (only if the tag is new)
#
# Base version X.Y.Z is read from the root package.json `version` field — bump it
# there to move from the current 0.0.1 to the 2.0.0 line when ready (§10.4).

on:
  push:
    branches:
      - development
      - main
      - 'release/**'
    paths-ignore:
      - 'docs/**'
      - '.vscode/**'
      - '.github/**'

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve channel + version
        id: v
        env:
          REF: ${{ github.ref_name }}
          RUN: ${{ github.run_number }}
        run: |
          BASE=$(node -p "require('./package.json').version")
          case "$REF" in
            development) TAG="v${BASE}-alpha.${RUN}"; PRERELEASE=true ;;
            release/*)   TAG="v${BASE}-beta.${RUN}";  PRERELEASE=true ;;
            main)        TAG="v${BASE}";              PRERELEASE=false ;;
            *)           echo "::error::Unexpected branch $REF"; exit 1 ;;
          esac
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved $REF -> $TAG (prerelease=$PRERELEASE)"

      - name: Skip if stable tag already exists
        id: guard
        env:
          TAG: ${{ steps.v.outputs.tag }}
          PRERELEASE: ${{ steps.v.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "false" ] && git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Stable tag $TAG already exists — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create (pre)release
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
          PRERELEASE: ${{ steps.v.outputs.prerelease }}
        run: |
          FLAGS=""
          [ "$PRERELEASE" = "true" ] && FLAGS="--prerelease"
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes \
            $FLAGS
