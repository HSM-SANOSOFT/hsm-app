name: Back-merge main → development

# Cascade (§6.2): after a stable release lands on main, open a PR merging main back
# into development so the trunk never falls behind production. Opened as a PR (not a
# direct push) because development is a protected branch — it must go through review
# + CI like everything else.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  back-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open (or update) cascade PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/back-merge-main-${{ github.run_number }}"
          git config user.name  "hsm-release-bot"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH" origin/main

          # Nothing to cascade if development already contains main.
          if git merge-base --is-ancestor origin/main origin/development; then
            echo "development already contains main — no back-merge needed."
            exit 0
          fi

          git push origin "$BRANCH"
          gh pr create \
            --base development \
            --head "$BRANCH" \
            --title "chore: back-merge main → development" \
            --body "Automated cascade after a stable release on \`main\`. Keeps \`development\` from drifting behind production. Merge once CI is green."
