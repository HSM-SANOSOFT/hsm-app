name: Lint

on:
  workflow_call: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        # No `version:` — let action-setup read `packageManager` from package.json
        # (pnpm@11.9.0). Passing a conflicting `version` fails action-setup with
        # "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: pnpm install
      - name: Run linter
        run: pnpm lint:fix
