name: hsm-app

networks:
  hsm-app-network:
    name: hsm-app-network
    driver: bridge

volumes:
  db_postgres_data:
    name: hsm-app-db_postgres-data
  db_redis_data:
    name: hsm-app-db_redis-data
  db_minio_data:
    name: hsm-app-db_minio-data

services:
  api:
    image: hsm-app-be-api
    build:
      context: ../
      dockerfile: apps/backend/api/Dockerfile
    networks:
      - hsm-app-network
    ports:
      - 10001:3000
    # Secrets are written per-app by .devcontainer/script/get-secrets-infisical.sh
    # (root ../.env holds only the Infisical *bootstrap* creds, not app secrets).
    env_file:
      - ../apps/backend/api/.env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
      - worker

  worker:
    image: hsm-app-be-worker
    build:
      context: ../
      dockerfile: apps/backend/worker/Dockerfile
    networks:
      - hsm-app-network
    ports:
      - 10002:3001
    # Per-app secrets file (see api service note above).
    env_file:
      - ../apps/backend/worker/.env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  web:
    image: hsm-app-fe-web
    build:
      context: ../
      dockerfile: apps/frontend/web/Dockerfile
    networks:
      - hsm-app-network
    ports:
      - 42000:4200
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:18-bookworm
    networks:
      - hsm-app-network
    ports:
      - 10004:5432
    volumes:
      - db_postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hsm
    restart: unless-stopped

  redis:
    image: redis:8-bookworm
    networks:
      - hsm-app-network
    ports:
      - 10005:6379
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/users.acl:/usr/local/etc/redis/users.acl:ro
      - db_redis_data:/data
    environment:
      REDIS_USER: redis
      REDIS_PASSWORD: redis
    command: [redis-server, /usr/local/etc/redis/redis.conf]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    networks:
      - hsm-app-network
    ports:
      - 10006:9000
      - 10007:9001
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - db_minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped