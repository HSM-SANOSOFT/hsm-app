name: hsm-app

networks:
  hsm-app-network:
    name: hsm-app-network
    driver: bridge

volumes:
  db_postgres_data:
    name: hsm-app-db_postgres-data
  db_redis_data:
    name: hsm-app-db_redis-data
  db_rustfs_data:
    name: hsm-app-db_rustfs-data

services:
  api:
    image: hsm-app-be-api
    build:
      context: ../
      dockerfile: apps/backend/api/Dockerfile
    networks:
      - hsm-app-network
    ports:
      - 10001:4201
    # Secrets are written per-app by .devcontainer/script/get-secrets-infisical.sh
    # (root ../.env holds only the Infisical *bootstrap* creds, not app secrets).
    env_file:
      - ../apps/backend/api/.env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - rustfs
      - worker

  worker:
    image: hsm-app-be-worker
    build:
      context: ../
      dockerfile: apps/backend/worker/Dockerfile
    networks:
      - hsm-app-network
    ports:
      - 10002:3001
    # Per-app secrets file (see api service note above).
    env_file:
      - ../apps/backend/worker/.env
    depends_on:
      - postgres
      - redis
      - rustfs
    restart: unless-stopped

  web:
    image: hsm-app-fe-web
    build:
      context: ../
      dockerfile: apps/frontend/web/Dockerfile
    networks:
      - hsm-app-network
    ports:
      - 42000:4200
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:18-bookworm
    networks:
      - hsm-app-network
    ports:
      - 10004:5432
    volumes:
      - db_postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hsm
    restart: unless-stopped

  redis:
    image: redis:8-bookworm
    networks:
      - hsm-app-network
    ports:
      - 10005:6379
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/users.acl:/usr/local/etc/redis/users.acl:ro
      - db_redis_data:/data
    environment:
      REDIS_USER: redis
      REDIS_PASSWORD: redis
    command: [redis-server, /usr/local/etc/redis/redis.conf]
    restart: unless-stopped

  # RustFS — S3-compatible object storage (replaces MinIO, which is no longer
  # free). The app talks to it via the same STRG_S3_* / AWS SDK path; only the
  # backing service and credentials change.
  rustfs:
    image: rustfs/rustfs:latest
    networks:
      - hsm-app-network
    ports:
      - 10006:9000
      - 10007:9001
    environment:
      RUSTFS_ACCESS_KEY: rustfs_user
      RUSTFS_SECRET_KEY: rustfs_password
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    volumes:
      - db_rustfs_data:/data
    restart: unless-stopped