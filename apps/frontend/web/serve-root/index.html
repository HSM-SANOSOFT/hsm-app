<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hospital Santa María</title>
    <!--
      Root locale chooser. `ng build --localize` emits one bundle per locale
      under /es/ and /en/ but no bundle at the site root, and the static server
      runs before any app JS. This page IS the root: it reads the persisted
      choice (hsm.lang), falls back to the browser language, then to Spanish,
      and forwards into that locale's build — so a returning English user who
      opens the bare domain lands in English instead of the static default.
      serve.json also routes any unmatched (non /es/, /en/) path here, so
      external deep links keep their path across the locale prefix.
    -->
    <script>
      (function () {
        var SUPPORTED = ['es', 'en'];
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;

        // Already locale-prefixed (e.g. "/es" with no trailing slash): just
        // normalize the trailing slash and let the locale bundle load.
        var seg = path.split('/').filter(Boolean)[0];
        if (SUPPORTED.indexOf(seg) !== -1) {
          var normalized = path.charAt(path.length - 1) === '/' ? path : path + '/';
          window.location.replace(normalized + search + hash);
          return;
        }

        var stored = null;
        try {
          stored = window.localStorage.getItem('hsm.lang');
        } catch (e) {
          /* storage blocked — fall through to navigator/default */
        }
        var nav = (window.navigator.language || 'es').slice(0, 2).toLowerCase();
        var locale =
          SUPPORTED.indexOf(stored) !== -1
            ? stored
            : SUPPORTED.indexOf(nav) !== -1
              ? nav
              : 'es';

        // Preserve the requested path (deep links) across the locale prefix.
        var rest = path === '/' ? '/' : path;
        window.location.replace('/' + locale + rest + search + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
