<div class="page page--editor">
  <header class="page-header">
    <div>
      <span class="page-eyebrow" i18n="@@templates.editor.page.eyebrow">AUTORÍA · PLANTILLAS</span>
      <h1 class="page-title" i18n="@@templates.editor.page.title">Editor de plantillas</h1>
      <p class="page-subtitle" i18n="@@templates.editor.page.subtitle">
        Cree plantillas Handlebars con una vista previa en vivo y aislada.
        Guardar renderiza la salida real compuesta por el servidor para su
        confirmación antes de guardar.
      </p>
    </div>
    <div class="page-actions">
      <!-- R17: stubbed Save seam — U14 wires draft-render + confirm + persist -->
      <p-button
        i18n-label="@@templates.editor.save"
        label="Guardar"
        icon="pi pi-save"
        (onClick)="onSave()"
        data-testid="save-button"
      />
    </div>
  </header>

  <section class="template-editor" data-testid="template-editor">
    <!-- R12: foldable metadata bar -->
    <p-panel
      i18n-header="@@templates.editor.metadata.panelHeader"
      header="Metadatos de la plantilla"
      [toggleable]="true"
      styleClass="meta-panel"
      data-testid="metadata-panel"
    >
      <div class="field-grid">
        <label class="field">
          <span i18n="@@templates.editor.metadata.name.label">Nombre</span>
          <input
            pInputText
            type="text"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            data-testid="meta-name"
          />
        </label>

        <label class="field">
          <span i18n="@@templates.editor.metadata.category.label">Categoría</span>
          <p-select
            [options]="categoryOptions"
            optionLabel="label"
            optionValue="value"
            [ngModel]="category()"
            (ngModelChange)="category.set($event)"
            data-testid="meta-category"
          />
        </label>

        <label class="field field--wide">
          <span i18n="@@templates.editor.metadata.description.label">Descripción</span>
          <input
            pInputText
            type="text"
            [ngModel]="description()"
            (ngModelChange)="description.set($event)"
            data-testid="meta-description"
          />
        </label>

        <!-- R12: base-template selector (BASE-category templates only) -->
        <label class="field">
          <span i18n="@@templates.editor.metadata.baseTemplate.label">Plantilla base</span>
          <p-select
            [options]="baseTemplates()"
            optionLabel="label"
            optionValue="value"
            [showClear]="true"
            i18n-placeholder="@@templates.editor.metadata.baseTemplate.placeholder"
            placeholder="Ninguna (contenido completo)"
            [ngModel]="baseTemplateId()"
            (ngModelChange)="baseTemplateId.set($event)"
            data-testid="meta-base-template"
          />
        </label>
      </div>
    </p-panel>

    @if (loadError(); as err) {
      <p-message severity="error" [text]="err" data-testid="load-error" />
    }

    <!-- R13: split layout — editor + sample data on the left, preview right -->
    <div class="split">
      <div class="split__pane split__pane--edit">
        <div class="frame">
          <div class="frame__header">
            <span class="frame__label mono" i18n="@@templates.editor.frame.content.label">PLANTILLA · HANDLEBARS</span>
          </div>
          <div class="frame__body">
            <app-monaco-editor
              language="handlebars"
              height="320px"
              [value]="content()"
              (valueChange)="content.set($event)"
              data-testid="content-editor"
            />
          </div>
        </div>

        <!-- R15 / AE5: editable sample-data panel, seeded from schema -->
        <div class="frame">
          <div class="frame__header">
            <span class="frame__label mono" i18n="@@templates.editor.frame.sampleData.label">DATOS DE MUESTRA · JSON</span>
          </div>
          <div class="frame__body">
            <app-monaco-editor
              language="json"
              height="200px"
              [value]="sampleDataJson()"
              (valueChange)="sampleDataJson.set($event)"
              data-testid="sample-data-editor"
            />
          </div>
        </div>
      </div>

      <div class="split__pane split__pane--preview">
        <div class="frame frame--fill">
          <div class="frame__header">
            <span class="frame__label mono" i18n="@@templates.editor.frame.preview.label">VISTA PREVIA</span>
          </div>
          <div class="frame__body frame__body--preview">
            <!-- R16 / KTD7: sandboxed iframe, allow-scripts ONLY -->
            <iframe
              class="preview-frame"
              i18n-title="@@templates.editor.preview.iframeTitle"
              title="Vista previa de la plantilla"
              sandbox="allow-scripts"
              [srcdoc]="previewSrcdoc()"
              data-testid="preview-iframe"
            ></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
