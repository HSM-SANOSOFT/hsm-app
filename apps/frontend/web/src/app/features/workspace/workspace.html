<div class="page workspace">
  <header class="workspace-header">
    <span class="page-eyebrow">{{ 'workspace.home.eyebrow' | transloco }}</span>
    <h1 class="workspace-greeting" data-testid="workspace-greeting">
      {{ 'workspace.home.greetingText' | transloco: { value: firstName() } }}
    </h1>
    <p class="workspace-sub">{{ 'workspace.home.subtitle' | transloco }}</p>
  </header>

  <div class="quicklinks" data-testid="quicklinks">
    @for (link of links(); track link.route) {
      <a
        class="quicklink"
        data-testid="quicklink"
        [routerLink]="link.route"
      >
        <span class="quicklink__icon" aria-hidden="true">
          <i [class]="link.icon"></i>
        </span>
        <span class="quicklink__body">
          <span class="quicklink__label">{{ link.label | transloco }}</span>
          <span class="quicklink__desc">{{ link.description | transloco }}</span>
        </span>
        <i class="pi pi-arrow-right quicklink__arrow" aria-hidden="true"></i>
      </a>
    }
  </div>
</div>
